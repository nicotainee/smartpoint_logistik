<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SmartPoint</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0f14; --surface:#161920; --border:#262b36; --accent:#00e5a0; --text:#e8eaf0; --muted:#6b7385; --warn:#ff4d4d; --radius:12px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }

    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:48px 40px;
      width:100%; max-width:420px;
    }

    .logo {
      font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800;
      color:var(--accent); margin-bottom:8px; display:flex; align-items:center; gap:8px;
    }
    .logo span { color:var(--text); }

    .subtitle { color:var(--muted); font-size:0.82rem; margin-bottom:36px; }

    .form-group { margin-bottom:20px; }
    label { display:block; font-size:0.76rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
    input {
      width:100%; background:var(--bg); border:1px solid var(--border);
      border-radius:8px; padding:12px 16px;
      color:var(--text); font-family:'DM Mono',monospace; font-size:0.88rem;
      outline:none; transition:border-color 0.2s;
    }
    input:focus { border-color:var(--accent); }
    input::placeholder { color:var(--muted); }

    .btn-login {
      width:100%; padding:14px;
      background:var(--accent); color:#0d0f14;
      border:none; border-radius:8px;
      font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700;
      cursor:pointer; margin-top:8px; transition:all 0.2s;
    }
    .btn-login:hover { background:#00c98c; transform:translateY(-1px); }

    .flash { padding:12px 16px; border-radius:8px; margin-bottom:20px; font-size:0.84rem; background:rgba(255,77,77,0.1); border:1px solid rgba(255,77,77,0.3); color:var(--warn); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📦 Smart<span>Point</span></div>
  <p class="subtitle">Login untuk akses Admin Dashboard</p>

  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}
      <div class="flash">❌ {{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="admin" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div style="position:relative"><input type="password" name="password" id="passwordInput" placeholder="••••••••" required style="padding-right:44px"><button type="button" onclick="var i=document.getElementById('passwordInput');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁️':'🙈'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem">👁️</button></div>
    </div>
    <button type="submit" class="btn-login">🔐 Login</button>
  </form>
</div>
</body>
</html>

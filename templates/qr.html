<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR — {{ point.kode_unik }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0f14; --surface:#161920; --border:#262b36; --accent:#00e5a0; --text:#e8eaf0; --muted:#6b7385; --radius:12px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:40px; width:100%; max-width:400px; text-align:center; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); text-decoration:none; font-size:0.8rem; margin-bottom:28px; transition:color 0.2s; }
    .back-link:hover { color:var(--accent); }
    .badge { display:inline-block; background:rgba(0,229,160,0.1); color:var(--accent); padding:4px 14px; border-radius:4px; font-size:0.84rem; margin-bottom:20px; border:1px solid rgba(0,229,160,0.25); }
    h2 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; margin-bottom:6px; }
    .subtitle { color:var(--muted); font-size:0.8rem; margin-bottom:28px; }
    .qr-box { background:white; border-radius:12px; padding:20px; display:inline-block; margin-bottom:24px; }
    .qr-box img { display:block; width:200px; height:200px; }
    .info-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:0.82rem; }
    .info-row:last-of-type { border-bottom:none; }
    .info-label { color:var(--muted); }
    .btn-dl { display:block; margin-top:24px; padding:12px; background:var(--accent); color:#0d0f14; border-radius:8px; text-decoration:none; font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; transition:all 0.2s; }
    .btn-dl:hover { background:#00c98c; }
  </style>
</head>
<body>
<div class="card">
  <a href="/admin" class="back-link">← Dashboard</a>
  <div><span class="badge">{{ point.kode_unik }}</span></div>
  <h2>{{ point.nama_penerima }}</h2>
  <p class="subtitle">Scan QR → Google Maps → Navigasi langsung</p>

  <div class="qr-box">
    <img src="/static/{{ qr_file }}" alt="QR Code">
  </div>

  <div>
    <div class="info-row">
      <span class="info-label">Koordinat</span>
      <span>{{ point.latitude }}, {{ point.longitude }}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Patokan</span>
      <span>{{ point.patokan_visual }}</span>
    </div>
    <div class="info-row">
      <span class="info-label">URL Scan</span>
      <span>/cek/{{ point.kode_unik }}</span>
    </div>
  </div>

  <a href="/static/{{ qr_file }}" download class="btn-dl">⬇️ Download QR Code</a>
</div>
</body>
</html>

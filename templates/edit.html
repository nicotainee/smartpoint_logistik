<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Smart Point</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0f14; --surface:#161920; --border:#262b36; --accent:#00e5a0; --text:#e8eaf0; --muted:#6b7385; --warn:#ff4d4d; --radius:12px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:40px; width:100%; max-width:520px; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); text-decoration:none; font-size:0.8rem; margin-bottom:28px; transition:color 0.2s; }
    .back-link:hover { color:var(--accent); }
    h2 { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:6px; }
    .subtitle { color:var(--muted); font-size:0.82rem; margin-bottom:32px; }
    .form-group { margin-bottom:20px; }
    label { display:block; font-size:0.76rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
    input, textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 16px; color:var(--text); font-family:'DM Mono',monospace; font-size:0.88rem; outline:none; transition:border-color 0.2s; }
    input:focus, textarea:focus { border-color:var(--accent); }
    textarea { resize:vertical; min-height:80px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .btn-submit { width:100%; padding:14px; background:var(--accent); color:#0d0f14; border:none; border-radius:8px; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:8px; transition:all 0.2s; }
    .btn-submit:hover { background:#00c98c; transform:translateY(-1px); }
    .flash { padding:12px 16px; border-radius:8px; margin-bottom:20px; font-size:0.84rem; }
    .flash.error { background:rgba(255,77,77,0.1); border:1px solid rgba(255,77,77,0.3); color:var(--warn); }
  </style>
</head>
<body>
<div class="card">
  <a href="/admin" class="back-link">← Kembali ke Dashboard</a>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <h2>Edit Smart Point</h2>
  <p class="subtitle">Update data untuk <strong style="color:var(--accent)">{{ point.kode_unik }}</strong></p>

  <form method="POST">
    <div class="form-group">
      <label>Kode Unik</label>
      <input type="text" name="kode_unik" value="{{ point.kode_unik }}" required>
    </div>
    <div class="form-group">
      <label>Nama Penerima</label>
      <input type="text" name="nama_penerima" value="{{ point.nama_penerima }}" required>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Latitude</label>
        <input type="text" name="latitude" value="{{ point.latitude }}" required>
      </div>
      <div class="form-group">
        <label>Longitude</label>
        <input type="text" name="longitude" value="{{ point.longitude }}" required>
      </div>
    </div>
    <div class="form-group">
      <label>Patokan Visual</label>
      <textarea name="patokan_visual">{{ point.patokan_visual }}</textarea>
    </div>
    <button type="submit" class="btn-submit">💾 Simpan Perubahan</button>
  </form>
</div>
</body>
</html>
